<div class="container mt-5">
  <div class="row justify-content-center">

    <div class="col-md-5">

      <div class="card shadow-lg border-0">

        <div class="card-body p-4">

          <h2 class="text-center mb-4">
            Employee Management System
          </h2>

          <form
            [formGroup]="loginForm"
            (ngSubmit)="onSubmit()">

            <!-- Email -->

            <div class="mb-3">

              <label class="form-label">
                Email Address
              </label>

              <input
                type="email"
                class="form-control"
                formControlName="email"
                placeholder="Enter Email">

              <div
                class="text-danger mt-1"
                *ngIf="loginForm.get('email')?.touched">

                <small
                  *ngIf="loginForm.get('email')?.errors?.['required']">

                  Email is required

                </small>

                <small
                  *ngIf="loginForm.get('email')?.errors?.['email']">

                  Enter valid email address

                </small>

              </div>

            </div>

            <!-- Password -->

            <div class="mb-3">

              <label class="form-label">
                Password
              </label>

              <input
                type="password"
                class="form-control"
                formControlName="password"
                placeholder="Enter Password">

              <div
                class="text-danger mt-1"
                *ngIf="loginForm.get('password')?.touched">

                <small
                  *ngIf="loginForm.get('password')?.errors?.['required']">

                  Password is required

                </small>

                <small
                  *ngIf="loginForm.get('password')?.errors?.['minlength']">

                  Minimum 8 characters required

                </small>

                <small
                  *ngIf="loginForm.get('password')?.errors?.['pattern']">

                  Must contain Uppercase, Lowercase, Number and Special Character

                </small>

              </div>

            </div>

            <button
              class="btn btn-primary w-100"
              type="submit"
              [disabled]="loginForm.invalid">

              Login

            </button>

          </form>

        </div>

      </div>

    </div>

  </div>
</div>
